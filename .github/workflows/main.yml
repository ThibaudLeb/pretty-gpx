name: Build and Push Docker Image to Google Cloud

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Update repositories
      run: sudo apt-get update

    - name: Install libfftw3-dev
      run: sudo apt-get install -y libfftw3-dev

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v1'

    - name: 'Configure Docker to use gcloud as a credential helper'
      run: |
        gcloud auth configure-docker

    - name: Build and push Docker image
      run: |
        cd supabase/functions/process-gpx
        gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/pretty-gpx-processor:latest .

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy pretty-gpx-processor \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/pretty-gpx-processor:latest \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated \
          --port 8080 \
          --memory 2Gi \
          --cpu 2 \
          --max-instances 10
